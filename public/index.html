<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HR뉴스"/>
<meta name="theme-color" content="#0f0f14"/>
<link rel="manifest" href="/manifest.json"/>
<title>HR 뉴스</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2a2a3a;
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #44445a;
  --accent: #4f7fff;
  --c1: #4f7fff;
  --c2: #ff6b6b;
  --c3: #ffb347;
  --c4: #4ecdc4;
  --c5: #a78bfa;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

#app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  flex-shrink: 0;
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.header-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.header-sub { margin-left: auto; font-size: 11px; color: var(--text3); }

/* Date selector */
.date-row { display: flex; gap: 8px; align-items: center; }
.date-chip {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  white-space: nowrap;
}
.date-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.date-input {
  padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; outline: none;
  transition: border-color 0.2s;
}
.date-input:focus { border-color: var(--accent); }

/* Category scroll */
.cat-scroll {
  display: flex; gap: 8px; padding: 10px 16px;
  overflow-x: auto; background: var(--surface);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none; flex-shrink: 0;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.cat-btn.active { color: #fff; border-color: transparent; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.content::-webkit-scrollbar { display: none; }

/* Toolbar */
.toolbar { display: flex; justify-content: space-between; align-items: center; padding: 4px 4px 0; }
.refresh-btn {
  background: none; border: none; color: var(--accent);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; padding: 4px 8px;
}
.date-label { font-size: 11px; color: var(--text3); padding: 4px 4px; }

/* News Card */
.news-card {
  background: var(--surface); border-radius: 16px;
  padding: 16px; border: 1px solid var(--border);
}
.card-num {
  font-size: 10px; font-weight: 900; color: var(--accent);
  margin-bottom: 6px; letter-spacing: 1px;
}
.card-top { display: flex; gap: 10px; align-items: flex-start; }
.news-title {
  flex: 1; font-size: 14px; font-weight: 600; line-height: 1.55;
  color: var(--text); text-decoration: none;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.news-title:hover { color: var(--accent); }
.scrap-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s; }
.scrap-btn:hover { opacity: 1; }
.news-date { font-size: 11px; color: var(--text3); margin-top: 5px; }
.news-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-top: 10px; }
.expand-btn { background: none; border: none; color: var(--text3); font-size: 11px; cursor: pointer; margin-top: 8px; font-family: 'Noto Sans KR', sans-serif; padding: 0; }
.ai-btn {
  margin-top: 10px; background: rgba(79,127,255,0.1); border: 1px solid rgba(79,127,255,0.25);
  border-radius: 10px; padding: 8px 14px; color: var(--accent); font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
}
.summary-box { margin-top: 10px; background: rgba(79,127,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 10px 12px; }
.summary-label { font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
.summary-text { font-size: 12px; color: var(--text); line-height: 2; white-space: pre-line; }

/* Empty / Loading */
.empty-box { display: flex; flex-direction: column; align-items: center; padding: 60px 0; color: var(--text3); gap: 10px; font-size: 14px; }
.loading-box { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 60px 0; color: var(--text3); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Bottom Nav */
.bottom-nav {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: calc(8px + var(--safe-bottom)); flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 4px; border: none; background: transparent;
  color: var(--text3); cursor: pointer; font-size: 10px;
  font-family: 'Noto Sans KR', sans-serif; gap: 3px; transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; }

/* Scrap */
.cat-chip { font-size: 10px; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; display: inline-block; }

/* Toast */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
  color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 13px;
  white-space: nowrap; z-index: 999; border: 1px solid rgba(255,255,255,0.15);
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* Settings */
.settings-wrap { padding: 24px 20px; overflow-y: auto; height: 100%; }
.settings-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.settings-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 24px; }
.info-box { background: var(--surface2); border-radius: 14px; padding: 16px 18px; font-size: 12px; color: var(--text2); line-height: 2.2; border: 1px solid var(--border); margin-bottom: 16px; }
.info-title { font-weight: 700; color: var(--text); margin-bottom: 4px; }
.install-btn {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--c1), var(--c5));
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 16px;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span style="font-size:22px">📰</span>
      <span class="header-title">HR 뉴스</span>
      <span class="header-sub">AI 선별 TOP 5</span>
    </div>
    <div class="date-row" id="date-row"></div>
  </div>
  <div id="main-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('news')" id="nav-news">
      <span class="nav-icon">🗞️</span><span>뉴스</span>
    </button>
    <button class="nav-btn" onclick="switchTab('scraps')" id="nav-scraps">
      <span class="nav-icon">📌</span><span id="nav-scrap-label">스크랩</span>
    </button>
    <button class="nav-btn" onclick="switchTab('settings')" id="nav-settings">
      <span class="nav-icon">⚙️</span><span>설정</span>
    </button>
  </div>
</div>

<script>
const CATEGORIES = [
  { id:'hr',      label:'HR·인사',      keyword:'인사관리 HR',   color:'#4f7fff' },
  { id:'labor',   label:'노동법·노무',   keyword:'노동법 노무',   color:'#ff6b6b' },
  { id:'recruit', label:'채용·취업',     keyword:'채용 취업시장', color:'#ffb347' },
  { id:'economy', label:'경제·경영',     keyword:'경제 경영',     color:'#4ecdc4' },
  { id:'welfare', label:'복지·조직문화', keyword:'복지 조직문화', color:'#a78bfa' },
];

// 오늘 날짜 (KST)
function getTodayKST() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().split('T')[0];
}
function getYesterdayKST() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000 - 86400000);
  return kst.toISOString().split('T')[0];
}
function formatDisplayDate(str) {
  const [y, m, d] = str.split('-');
  return `${m}월 ${d}일`;
}

let currentTab = 'news';
let activeCategory = CATEGORIES[0];
let selectedDate = getTodayKST();
let dateMode = 'today'; // today | yesterday | custom
let newsCache = {}; // key: `${catId}_${date}`
let summaryCache = {};
let scraps = JSON.parse(localStorage.getItem('hr_scraps') || '[]');
let expanded = null;
let scrapFilter = 'all';
let toastTimer = null;
let deferredPrompt = null;

// PWA install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

function saveScraps() { localStorage.setItem('hr_scraps', JSON.stringify(scraps)); }

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  if (toastTimer) clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.getElementById('app').appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 2200);
}

function updateScrapLabel() {
  const l = document.getElementById('nav-scrap-label');
  if (l) l.textContent = scraps.length > 0 ? `스크랩(${scraps.length})` : '스크랩';
}

function renderDateRow() {
  const today = getTodayKST();
  const yesterday = getYesterdayKST();
  document.getElementById('date-row').innerHTML = `
    <button class="date-chip ${dateMode==='today'?'active':''}" onclick="setDateMode('today')">오늘</button>
    <button class="date-chip ${dateMode==='yesterday'?'active':''}" onclick="setDateMode('yesterday')">어제</button>
    <input type="date" class="date-input" value="${selectedDate}" max="${today}"
      onchange="setCustomDate(this.value)" id="date-picker"/>
  `;
}

function setDateMode(mode) {
  dateMode = mode;
  if (mode === 'today') selectedDate = getTodayKST();
  else if (mode === 'yesterday') selectedDate = getYesterdayKST();
  expanded = null;
  renderDateRow();
  if (currentTab === 'news') {
    const cacheKey = `${activeCategory.id}_${selectedDate}`;
    if (!newsCache[cacheKey]) fetchNews(activeCategory);
    else renderNews();
  }
}

function setCustomDate(val) {
  selectedDate = val;
  dateMode = 'custom';
  expanded = null;
  renderDateRow();
  if (currentTab === 'news') {
    const cacheKey = `${activeCategory.id}_${selectedDate}`;
    if (!newsCache[cacheKey]) fetchNews(activeCategory);
    else renderNews();
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab)?.classList.add('active');
  render();
}

function formatDate(str) {
  try {
    const d = new Date(str);
    const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return `${kst.getMonth()+1}/${kst.getDate()} ${kst.getHours()}:${String(kst.getMinutes()).padStart(2,'0')}`;
  } catch { return str; }
}

async function fetchNews(cat) {
  const wrap = document.getElementById('main-content');
  wrap.innerHTML = renderCatTabsHTML() +
    `<div class="content"><div class="loading-box"><div class="spinner"></div>AI가 오늘의 TOP 5 선별 중...</div></div>`;

  try {
    const res = await fetch(`/api/news?keyword=${encodeURIComponent(cat.keyword)}&date=${selectedDate}`);
    const data = await res.json();
    const cacheKey = `${cat.id}_${selectedDate}`;
    newsCache[cacheKey] = data.items || [];
    if (newsCache[cacheKey].length === 0) {
      showToast('📭 해당 날짜 기사가 없어요');
    }
  } catch {
    const cacheKey = `${cat.id}_${selectedDate}`;
    newsCache[cacheKey] = [];
    showToast('❌ 뉴스를 불러오지 못했어요');
  }
  renderNews();
}

async function summarize(itemId, idx) {
  const cacheKey = `${activeCategory.id}_${selectedDate}`;
  const item = (newsCache[cacheKey] || []).find(n => n.link === itemId);
  if (!item) return;

  const el = document.getElementById('summary-area-' + idx);
  if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text3);margin-top:8px;">🤖 AI 요약 중...</div>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: `다음 뉴스를 HR 담당자 관점에서 핵심 포인트 3개를 bullet로 요약해줘. 각 bullet은 "• "로 시작하는 한 문장으로.\n\n제목: ${item.title}\n내용: ${item.description}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '요약 실패';
    summaryCache[itemId] = text;
  } catch {
    summaryCache[itemId] = '요약 중 오류가 발생했어요.';
  }

  if (el) {
    el.innerHTML = `<div class="summary-box"><div class="summary-label">🤖 AI 핵심 요약</div><div class="summary-text">${summaryCache[itemId]}</div></div>`;
  }
}

function scrap(itemId) {
  const cacheKey = `${activeCategory.id}_${selectedDate}`;
  const item = (newsCache[cacheKey] || []).find(n => n.link === itemId);
  if (!item) return;
  if (scraps.find(s => s.id === itemId)) { showToast('이미 스크랩된 기사예요'); return; }
  scraps.unshift({
    id: itemId, ...item,
    category: activeCategory.id, categoryLabel: activeCategory.label, categoryColor: activeCategory.color,
    scrapDate: new Date().toISOString(),
    summary: summaryCache[itemId] || null
  });
  saveScraps(); updateScrapLabel();
  showToast('✅ 스크랩 완료!');
}

function deleteScrap(itemId) {
  scraps = scraps.filter(s => s.id !== itemId);
  saveScraps(); updateScrapLabel();
  showToast('🗑️ 삭제됐어요');
  renderScraps();
}

function renderCatTabsHTML() {
  return `<div class="cat-scroll">
    ${CATEGORIES.map(c => `<button class="cat-btn${c.id===activeCategory.id?' active':''}"
      style="${c.id===activeCategory.id?`background:${c.color};`:''}"
      onclick="selectCat('${c.id}')">${c.label}</button>`).join('')}
  </div>`;
}

function selectCat(id) {
  activeCategory = CATEGORIES.find(c => c.id === id);
  expanded = null;
  const cacheKey = `${activeCategory.id}_${selectedDate}`;
  if (!newsCache[cacheKey]) fetchNews(activeCategory);
  else renderNews();
}

function renderNews() {
  const cacheKey = `${activeCategory.id}_${selectedDate}`;
  const items = newsCache[cacheKey] || [];
  const wrap = document.getElementById('main-content');

  const toolbar = `<div class="toolbar">
    <span class="date-label">${formatDisplayDate(selectedDate)} · ${activeCategory.label}</span>
    <button class="refresh-btn" onclick="refreshNews()">🔄 새로고침</button>
  </div>`;

  let cards = '';
  if (items.length === 0) {
    cards = `<div class="empty-box"><div style="font-size:44px">📭</div><div>해당 날짜 기사가 없어요</div></div>`;
  } else {
    cards = items.map((item, i) => {
      const isExp = expanded === item.link;
      const summary = summaryCache[item.link];
      const safeId = item.link.replace(/['"]/g, '');
      return `<div class="news-card">
        <div class="card-num">TOP ${i+1}</div>
        <div class="card-top">
          <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
          <button class="scrap-btn" onclick="scrap('${safeId}')">📌</button>
        </div>
        <div class="news-date">${formatDate(item.pubDate)}</div>
        ${isExp ? `
          <div class="news-desc">${item.description}</div>
          ${summary
            ? `<div class="summary-box"><div class="summary-label">🤖 AI 핵심 요약</div><div class="summary-text">${summary}</div></div>`
            : `<div id="summary-area-${i}"><button class="ai-btn" onclick="summarize('${safeId}', ${i})">🤖 AI 요약하기</button></div>`
          }
        ` : ''}
        <button class="expand-btn" onclick="toggleExpand('${safeId}')">${isExp ? '▲ 접기' : '▼ 펼치기'}</button>
      </div>`;
    }).join('');
  }

  wrap.innerHTML = renderCatTabsHTML() + toolbar + `<div class="content">${cards}</div>`;
}

function toggleExpand(id) {
  expanded = expanded === id ? null : id;
  renderNews();
}

function refreshNews() {
  const cacheKey = `${activeCategory.id}_${selectedDate}`;
  delete newsCache[cacheKey];
  expanded = null;
  fetchNews(activeCategory);
}

function renderScraps() {
  const filtered = scrapFilter === 'all' ? scraps : scraps.filter(s => s.category === scrapFilter);
  const wrap = document.getElementById('main-content');

  const filterTabs = `<div class="cat-scroll">
    <button class="cat-btn${scrapFilter==='all'?' active':''}"
      style="${scrapFilter==='all'?'background:#333;color:#fff;':''}"
      onclick="setScrapFilter('all')">전체(${scraps.length})</button>
    ${CATEGORIES.map(c => {
      const cnt = scraps.filter(s => s.category === c.id).length;
      if (!cnt) return '';
      return `<button class="cat-btn${scrapFilter===c.id?' active':''}"
        style="${scrapFilter===c.id?`background:${c.color};color:#fff;`:''}"
        onclick="setScrapFilter('${c.id}')">${c.label}(${cnt})</button>`;
    }).join('')}
  </div>`;

  let cards = '';
  if (filtered.length === 0) {
    cards = `<div class="empty-box"><div style="font-size:44px">📂</div><div>스크랩한 기사가 없어요</div></div>`;
  } else {
    cards = filtered.map(item => `
      <div class="news-card">
        <div class="card-top">
          <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
          <button class="scrap-btn" style="color:#ff6b6b" onclick="deleteScrap('${item.id?.replace(/['"]/g,'')}')">🗑️</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
          <span class="cat-chip" style="background:${item.categoryColor}">${item.categoryLabel}</span>
          <span class="news-date">${formatDate(item.scrapDate)}</span>
        </div>
        ${item.summary ? `<div class="summary-box" style="margin-top:10px"><div class="summary-label">🤖 AI 핵심 요약</div><div class="summary-text">${item.summary}</div></div>` : ''}
      </div>
    `).join('');
  }

  wrap.innerHTML = filterTabs + `<div class="content">${cards}</div>`;
}

function setScrapFilter(f) { scrapFilter = f; renderScraps(); }

function renderSettings() {
  const wrap = document.getElementById('main-content');
  wrap.innerHTML = `<div class="content"><div class="settings-wrap">
    <div class="settings-title">⚙️ 설정</div>
    <p class="settings-desc">앱 설치 및 API 환경변수 안내</p>

    ${deferredPrompt ? `<button class="install-btn" onclick="installPWA()">📱 홈화면에 앱 추가하기</button>` : ''}

    <div class="info-box">
      <div class="info-title">📱 홈화면 추가 (iOS Safari)</div>
      <div>1. Safari에서 이 페이지 접속</div>
      <div>2. 하단 공유 버튼 탭</div>
      <div>3. "홈 화면에 추가" 선택</div>
    </div>

    <div class="info-box">
      <div class="info-title">🔑 API 키 설정 (Vercel)</div>
      <div>Settings → Environment Variables</div>
      <div>• NAVER_CLIENT_ID</div>
      <div>• NAVER_CLIENT_SECRET</div>
      <div>• ANTHROPIC_API_KEY (AI 선별용)</div>
      <div style="margin-top:6px;color:var(--text3)">변경 후 Redeploy 필요</div>
    </div>

    <div class="info-box">
      <div class="info-title">ℹ️ 앱 정보</div>
      <div>HR 뉴스 스크랩 v2.0</div>
      <div>AI가 매일 카테고리별 TOP 5 선별</div>
      <div>스크랩은 기기에 저장됩니다</div>
    </div>
  </div></div>`;
}

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; renderSettings(); });
  }
}

function render() {
  renderDateRow();
  updateScrapLabel();
  if (currentTab === 'news') {
    const cacheKey = `${activeCategory.id}_${selectedDate}`;
    if (!newsCache[cacheKey]) fetchNews(activeCategory);
    else renderNews();
  } else if (currentTab === 'scraps') {
    renderScraps();
  } else {
    renderSettings();
  }
}

render();
</script>
</body>
</html>
